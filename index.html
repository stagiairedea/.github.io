<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DEA Formation — Flux Instagram</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root { --cuivre: #DB853C; --noir: #1a1a1a; --blanc: #ffffff; }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--noir); font-family:'Montserrat',sans-serif; color:var(--blanc); }

  #config-screen { position:fixed; inset:0; background:var(--noir); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:24px; padding:40px; z-index:100; }
  #config-screen h1 { font-size:22px; font-weight:500; color:var(--cuivre); letter-spacing:0.05em; text-transform:uppercase; }
  #config-screen p { font-size:13px; color:rgba(255,255,255,0.4); text-align:center; max-width:400px; line-height:1.6; }
  .btn-row { display:flex; gap:12px; flex-direction:column; align-items:center; width:100%; max-width:380px; }
  .btn-primary { background:var(--cuivre); color:var(--blanc); border:none; border-radius:6px; padding:14px 40px; font-size:13px; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; cursor:pointer; font-family:'Montserrat',sans-serif; width:100%; transition:opacity 0.2s; }
  .btn-primary:hover { opacity:0.85; }
  .btn-demo { background:transparent; border:1px solid rgba(219,133,60,0.4); color:var(--cuivre); border-radius:6px; padding:12px 40px; font-size:13px; font-weight:500; letter-spacing:0.06em; text-transform:uppercase; cursor:pointer; font-family:'Montserrat',sans-serif; width:100%; transition:background 0.2s; }
  .btn-demo:hover { background:rgba(219,133,60,0.08); }
  .separator { font-size:11px; color:rgba(255,255,255,0.2); letter-spacing:0.1em; text-transform:uppercase; }

  #demo-banner { display:none; position:fixed; top:0; left:0; right:0; background:rgba(219,133,60,0.15); border-bottom:1px solid rgba(219,133,60,0.3); text-align:center; padding:6px; font-size:11px; color:var(--cuivre); letter-spacing:0.08em; text-transform:uppercase; z-index:50; }

  #fs-btn { position:fixed; bottom:80px; right:20px; background:rgba(219,133,60,0.15); border:1px solid rgba(219,133,60,0.35); color:var(--cuivre); border-radius:8px; padding:10px 16px; font-size:12px; font-family:'Montserrat',sans-serif; cursor:pointer; z-index:200; letter-spacing:0.06em; transition:opacity 0.5s; }
  #fs-btn.hidden { opacity:0; pointer-events:none; }

  #player { display:none; position:fixed; inset:0; background:var(--noir); flex-direction:column; }
  #header { flex-shrink:0; display:flex; align-items:center; justify-content:space-between; padding:28px 36px 20px; border-bottom:1px solid rgba(219,133,60,0.2); }
  .logo-area { display:flex; align-items:center; gap:14px; }
  .logo-bird { width:44px; height:44px; flex-shrink:0; }
  .logo-text { display:flex; flex-direction:column; line-height:1.2; }
  .logo-text .brand-name { font-size:13px; font-weight:600; letter-spacing:0.12em; text-transform:uppercase; color:var(--blanc); }
  .logo-text .brand-sub { font-size:11px; font-weight:300; letter-spacing:0.06em; color:rgba(255,255,255,0.45); text-transform:lowercase; }
  .header-right { display:flex; align-items:center; gap:16px; }
  .ig-badge { display:flex; align-items:center; gap:8px; background:rgba(219,133,60,0.1); border:1px solid rgba(219,133,60,0.28); border-radius:20px; padding:6px 14px; }
  .ig-badge svg { width:16px; height:16px; flex-shrink:0; }
  .ig-badge span { font-size:12px; color:var(--cuivre); font-weight:500; letter-spacing:0.04em; }
  #clock { font-size:28px; font-weight:300; color:rgba(255,255,255,0.3); letter-spacing:0.04em; font-variant-numeric:tabular-nums; }

  #main { flex:1; overflow:hidden; position:relative; padding:28px 36px; }
  #slides-container { position:absolute; inset:0; }
  .slide { position:absolute; inset:28px 36px; display:flex; flex-direction:column; gap:20px; opacity:0; transition:opacity 0.8s ease; pointer-events:none; }
  .slide.active { opacity:1; pointer-events:auto; }
  .post-image-wrap { flex:1; min-height:0; border-radius:8px; overflow:hidden; position:relative; background:rgba(255,255,255,0.04); }
  .post-image-wrap img { width:100%; height:100%; object-fit:cover; display:block; }
  .post-image-wrap::after { content:''; position:absolute; bottom:0; left:0; right:0; height:40%; background:linear-gradient(to top,rgba(26,26,26,0.65) 0%,transparent 100%); pointer-events:none; }
  .post-caption { flex-shrink:0; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.07); border-left:3px solid var(--cuivre); border-radius:0 6px 6px 0; padding:18px 20px; max-height:160px; overflow:hidden; }
  .post-caption-text { font-size:15px; font-weight:300; line-height:1.65; color:rgba(255,255,255,0.8); display:-webkit-box; -webkit-line-clamp:4; -webkit-box-orient:vertical; overflow:hidden; }
  .post-meta { display:flex; align-items:center; justify-content:space-between; margin-top:10px; }
  .post-date { font-size:11px; color:rgba(255,255,255,0.28); letter-spacing:0.06em; text-transform:uppercase; }
  .post-type-badge { font-size:10px; letter-spacing:0.1em; text-transform:uppercase; color:var(--cuivre); font-weight:500; }

  #footer { flex-shrink:0; padding:0 36px 28px; }
  .progress-dots { display:flex; gap:6px; justify-content:center; margin-bottom:14px; }
  .dot { width:6px; height:6px; border-radius:50%; background:rgba(255,255,255,0.15); transition:all 0.3s; }
  .dot.active { background:var(--cuivre); width:22px; border-radius:3px; }
  .progress-bar-track { width:100%; height:2px; background:rgba(255,255,255,0.08); border-radius:1px; overflow:hidden; }
  #progress-fill { height:100%; background:var(--cuivre); border-radius:1px; width:0%; }

  #error-msg { display:none; position:absolute; inset:0; flex-direction:column; align-items:center; justify-content:center; gap:12px; text-align:center; padding:40px; }
  #error-msg h2 { font-size:16px; font-weight:500; color:#e07070; }
  #error-msg p { font-size:13px; color:rgba(255,255,255,0.4); line-height:1.6; max-width:340px; }
  #retry-btn { background:transparent; border:1px solid rgba(219,133,60,0.5); color:var(--cuivre); padding:10px 24px; border-radius:6px; font-size:13px; cursor:pointer; font-family:'Montserrat',sans-serif; margin-top:8px; }
  .hex-deco { position:absolute; bottom:-60px; right:-40px; width:180px; height:180px; opacity:0.04; pointer-events:none; }
</style>
</head>
<body>

<div id="config-screen">
  <h1>DEA Signage</h1>
  <p>Affichage en boucle des derniers posts Instagram de DEA Formation, via flux RSS.</p>
  <div class="btn-row">
    <button class="btn-primary" onclick="startSignage()">Lancer l'affichage</button>
    <span class="separator">ou</span>
    <button class="btn-demo" onclick="startDemo()">Mode démo (photos locales)</button>
  </div>
</div>

<div id="demo-banner">Mode démo</div>
<button id="fs-btn" class="hidden" onclick="goFullscreen()">⛶ Plein écran</button>

<div id="player">
  <div id="header">
    <div class="logo-area">
      <svg class="logo-bird" viewBox="0 0 44 44" fill="none">
        <polygon points="22,4 38,20 22,16" fill="#DB853C"/>
        <polygon points="22,4 6,20 22,16" fill="#ffffff" opacity="0.85"/>
        <polygon points="6,20 22,16 22,36" fill="#DB853C" opacity="0.7"/>
        <polygon points="38,20 22,16 22,36" fill="#ffffff" opacity="0.5"/>
        <polygon points="22,36 14,42 22,30" fill="#DB853C" opacity="0.9"/>
        <polygon points="18,8 10,14 16,18" fill="#ffffff" opacity="0.3"/>
      </svg>
      <div class="logo-text">
        <span class="brand-name">DEA Formation</span>
        <span class="brand-sub">le puy business school</span>
      </div>
    </div>
    <div class="header-right">
      <div class="ig-badge">
        <svg viewBox="0 0 24 24" fill="none" stroke="#DB853C" stroke-width="1.5">
          <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
          <circle cx="12" cy="12" r="4"/>
          <circle cx="17.5" cy="6.5" r="1" fill="#DB853C" stroke="none"/>
        </svg>
        <span>@dealepuybusinessschool</span>
      </div>
      <div id="clock">--:--</div>
    </div>
  </div>
  <div id="main">
    <div id="error-msg">
      <h2>Impossible de charger les posts</h2>
      <p id="error-detail"></p>
      <button id="retry-btn" onclick="location.reload()">Réessayer</button>
    </div>
    <div id="slides-container"></div>
    <svg class="hex-deco" viewBox="0 0 180 180">
      <polygon points="90,10 160,50 160,130 90,170 20,130 20,50" fill="none" stroke="#DB853C" stroke-width="2"/>
    </svg>
  </div>
  <div id="footer">
    <div class="progress-dots" id="dots-container"></div>
    <div class="progress-bar-track"><div id="progress-fill"></div></div>
  </div>
</div>

<script>
const SLIDE_MS = 6000, REFRESH_MS = 5*60*1000;
const RSS_FEED_URL = 'https://rss.app/feeds/C7uSDd67PJYX8W30.xml';
// Plusieurs proxys CORS en fallback, au cas où l'un serait temporairement indisponible
const RSS_PROXIES = [
  url => 'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(url),
  url => 'https://api.allorigins.win/raw?url=' + encodeURIComponent(url),
  url => 'https://corsproxy.io/?url=' + encodeURIComponent(url)
];
let posts = [], currentIdx = 0, slideTimer = null;

function updateClock() {
  const n = new Date();
  document.getElementById('clock').textContent =
    String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');
}
setInterval(updateClock,1000); updateClock();

function goFullscreen() {
  const el = document.documentElement;
  if (el.requestFullscreen) el.requestFullscreen();
  else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
  document.getElementById('fs-btn').classList.add('hidden');
}
document.addEventListener('fullscreenchange', () => {
  if (!document.fullscreenElement) document.getElementById('fs-btn').classList.remove('hidden');
});

function startDemo() {
  document.getElementById('config-screen').style.display='none';
  document.getElementById('player').style.display='flex';
  document.getElementById('demo-banner').style.display='block';
  document.getElementById('header').style.paddingTop='44px';
  document.getElementById('fs-btn').classList.remove('hidden');
  posts = DEMO_POSTS;
  buildSlides(true);
  startCarousel();
}

function startSignage() {
  document.getElementById('config-screen').style.display='none';
  document.getElementById('player').style.display='flex';
  document.getElementById('fs-btn').classList.remove('hidden');
  fetchPosts();
  setInterval(fetchPosts,REFRESH_MS);
}

async function fetchPosts() {
  let xmlText = null;
  let lastError = null;

  // Essaie chaque proxy dans l'ordre jusqu'à ce qu'un fonctionne
  for (const buildProxyUrl of RSS_PROXIES) {
    try {
      const resp = await fetch(buildProxyUrl(RSS_FEED_URL));
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      const text = await resp.text();
      if (!text || text.trim().length < 50) throw new Error('Réponse vide');
      xmlText = text;
      break;
    } catch (err) {
      lastError = err;
      continue;
    }
  }

  if (!xmlText) {
    document.getElementById('error-msg').style.display='flex';
    document.getElementById('error-detail').textContent =
      'Aucun proxy CORS disponible actuellement (' + (lastError?.message || 'erreur réseau') + '). Nouvelle tentative dans 5 min.';
    return;
  }

  try {
    const parser = new DOMParser();
    const xml = parser.parseFromString(xmlText, 'text/xml');

    const parseError = xml.querySelector('parsererror');
    if (parseError) throw new Error('Flux RSS invalide ou inaccessible.');

    const items = Array.from(xml.querySelectorAll('item')).slice(0, 8);
    if (!items.length) throw new Error('Aucun post trouvé dans le flux RSS.');

    posts = items.map(item => {
      const descRaw = item.querySelector('description')?.textContent || '';
      const tmp = document.createElement('div');
      tmp.innerHTML = descRaw;
      const imgEl = tmp.querySelector('img');
      const imgUrl = imgEl ? imgEl.getAttribute('src') : '';
      const textDiv = tmp.querySelectorAll('div')[1] || tmp.querySelectorAll('div')[0];
      const captionText = textDiv ? textDiv.textContent.trim() : tmp.textContent.trim();
      const pubDate = item.querySelector('pubDate')?.textContent || '';

      return {
        media_url: imgUrl,
        caption: captionText,
        timestamp: pubDate,
        media_type: 'IMAGE'
      };
    }).filter(p => p.media_url);

    if (!posts.length) throw new Error('Aucune image exploitable dans le flux.');

    buildSlides(false);
    startCarousel();
  } catch (err) {
    document.getElementById('error-msg').style.display='flex';
    document.getElementById('error-detail').textContent = err.message;
  }
}

function buildSlides(isDemo) {
  const container=document.getElementById('slides-container');
  const dots=document.getElementById('dots-container');
  container.innerHTML=''; dots.innerHTML='';
  posts.forEach((post,i)=>{
    const slide=document.createElement('div');
    slide.className='slide'+(i===0?' active':'');
    const src=isDemo?post.img:post.media_url;
    slide.innerHTML=`
      <div class="post-image-wrap"><img src="${src}" alt="Post ${i+1}" loading="lazy"></div>
      <div class="post-caption">
        <div class="post-caption-text">${escHtml(post.caption||'')}</div>
        <div class="post-meta">
          <span class="post-date">${formatDate(post.timestamp)}</span>
          <span class="post-type-badge">${typeLabel(post.media_type)}</span>
        </div>
      </div>`;
    container.appendChild(slide);
    const dot=document.createElement('div');
    dot.className='dot'+(i===0?' active':'');
    dots.appendChild(dot);
  });
}

function startCarousel(){
  currentIdx=0; clearInterval(slideTimer);
  showSlide(0);
  slideTimer=setInterval(nextSlide,SLIDE_MS);
}
function showSlide(idx){
  document.querySelectorAll('.slide').forEach((s,i)=>s.classList.toggle('active',i===idx));
  document.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('active',i===idx));
  animateProgress();
}
function nextSlide(){ currentIdx=(currentIdx+1)%posts.length; showSlide(currentIdx); }
function animateProgress(){
  const fill=document.getElementById('progress-fill');
  fill.style.transition='none'; fill.style.width='0%';
  void fill.offsetWidth;
  fill.style.transition=`width ${SLIDE_MS}ms linear`; fill.style.width='100%';
}
function formatDate(ts){
  if(!ts) return '';
  const d = new Date(ts);
  if (isNaN(d.getTime())) return '';
  return d.toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'});
}
function typeLabel(t){ if(t==='VIDEO')return'▶ Vidéo'; if(t==='CAROUSEL_ALBUM')return'⊞ Carrousel'; return'◻ Photo'; }
function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

</script>
</body>
</html>
